<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Routine</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 1.5rem;
    }

    /* --- Bandeau TV --- */
    .bandeau-tv {
      position: fixed;
      top: 1rem;
      left: 1rem;
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 600;
      color: #2d3748;
      z-index: 100;
    }
    .bandeau-tv .icone { font-size: 20px; }
    .bandeau-tv.allume { border-color: #68d391; background: #f0fff4; color: #276749; }

    /* --- Header --- */
    .header { text-align: center; margin-bottom: 1.5rem; padding-top: 3rem; }
    .titre { font-size: 32px; font-weight: 600; color: #1a202c; margin-bottom: 0.25rem; }
    .heure-actuelle { font-size: 22px; color: #4a5568; margin-bottom: 0.5rem; }
    .depart { font-size: 22px; font-weight: 600; color: #2b6cb0; margin-bottom: 0.75rem; }

    .countdown-box {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      background: #ebf8ff;
      border-radius: 16px;
      padding: 0.75rem 2rem;
    }
    .countdown-box.urgent { background: #fff5f5; }
    .countdown-box.done   { background: #f0fff4; }
    .countdown-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #2b6cb0; }
    .countdown-box.urgent .countdown-label { color: #c53030; }
    .countdown-box.done   .countdown-label { color: #276749; }
    .countdown-value { font-size: 60px; font-weight: 700; color: #2b6cb0; line-height: 1.1; }
    .countdown-box.urgent .countdown-value { color: #e53e3e; }
    .countdown-box.done   .countdown-value { color: #38a169; }

    /* --- Tâches --- */
    .taches { display: flex; flex-direction: column; gap: 14px; margin-top: 1.5rem; }
    .tache {
      display: flex; align-items: center; gap: 16px;
      background: white; border: 2px solid #e2e8f0;
      border-radius: 16px; padding: 1rem 1.25rem;
      cursor: pointer; transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .tache:active { transform: scale(0.98); }
    .tache.validee { background: #f0fff4; border-color: #9ae6b4; }
    .tache.non-modifiable { cursor: default; }
    .tache.non-modifiable:active { transform: none; }
    .tache-icone { font-size: 32px; flex-shrink: 0; }
    .tache-label { font-size: 22px; font-weight: 500; color: #1a202c; flex: 1; }
    .tache.validee .tache-label { color: #276749; text-decoration: line-through; }
    .tache-btn {
      width: 48px; height: 48px; border-radius: 50%;
      border: 2px solid #cbd5e0; background: #f7fafc;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0; color: #a0aec0;
    }
    .tache.validee .tache-btn { background: #38a169; border-color: #38a169; color: white; }
    .tv-countdown { font-size: 20px; font-weight: 700; color: #e53e3e; min-width: 48px; text-align: center; }

    /* --- Bravo --- */
    .bravo {
      text-align: center; margin-top: 1.5rem; padding: 1.25rem;
      background: #f0fff4; border: 2px solid #9ae6b4;
      border-radius: 16px; font-size: 26px; font-weight: 600;
      color: #276749; display: none;
    }
    .bravo.visible { display: block; }
  </style>
</head>
<body>

  <div class="bandeau-tv" id="bandeau-tv">
    <span class="icone">📺</span>
    <span id="shield-duree">--h--</span>
  </div>

  <div class="header">
    <div class="titre" id="titre">Chargement...</div>
    <div class="heure-actuelle" id="heure-actuelle">Il est --h--</div>
    <div class="depart" id="depart" style="display:none"></div>
    <div class="countdown-box" id="countdown-box" style="display:none">
      <span class="countdown-label" id="countdown-label">Minutes restantes</span>
      <span class="countdown-value" id="countdown">--</span>
    </div>
  </div>

  <div class="taches" id="liste-taches"></div>
  <div class="bravo" id="bravo">🎉 Prêt à partir !</div>

  <script>
    let routineData = null;

    // --- Heure actuelle ---
    function majHeure() {
      const now = new Date();
      const h = now.getHours();
      const m = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('heure-actuelle').textContent = `Il est ${h}h${m}`;
    }

    // --- Compte à rebours départ ---
    function majCompteur(departH, departM) {
      const box = document.getElementById('countdown-box');
      if (!departH && departH !== 0) { box.style.display = 'none'; return; }
      box.style.display = 'inline-flex';
      const now = new Date();
      const depart = new Date(now);
      depart.setHours(departH, departM, 0, 0);
      const diffMs = depart - now;
      const val   = document.getElementById('countdown');
      const label = document.getElementById('countdown-label');
      if (diffMs <= 0) {
        val.textContent   = '0';
        label.textContent = "C'est l'heure !";
        box.className     = 'countdown-box urgent';
      } else {
        const mins        = Math.ceil(diffMs / 60000);
        val.textContent   = mins;
        label.textContent = 'Minutes restantes';
        box.className     = mins <= 10 ? 'countdown-box urgent' : 'countdown-box';
      }
    }

    // --- Compte à rebours TV ---
    function majCompteurTV() {
      const now = new Date();
      const fin = new Date(now);
      fin.setHours(19, 40, 0, 0);
      const diffMs = fin - now;
      const el = document.querySelector('.tv-countdown');
      if (!el) return;
      if (diffMs <= 0) {
        el.textContent = '0';
      } else {
        el.textContent = Math.ceil(diffMs / 60000) + ' min';
      }
    }

    // --- Charger la routine ---
    async function chargerRoutine() {
      try {
        const res  = await fetch('/api/routine');
        routineData = await res.json();

        document.getElementById('titre').textContent = routineData.titre;

        const departEl = document.getElementById('depart');
        if (routineData.departLabel) {
          departEl.textContent = routineData.departLabel;
          departEl.style.display = 'block';
        } else {
          departEl.style.display = 'none';
        }

        majCompteur(routineData.departH, routineData.departM);

        const liste = document.getElementById('liste-taches');
        liste.innerHTML = '';
        routineData.taches.forEach(t => {
          const div = document.createElement('div');
          const estTV = t.special === 'tv';
          div.className = 'tache' + (t.etat ? ' validee' : '') + (estTV ? ' non-modifiable' : '');
          div.dataset.id = t.id;

          let bouton = '';
          if (estTV && !t.etat) {
            bouton = `<span class="tv-countdown">...</span>`;
          } else {
            bouton = `<span class="tache-btn">${t.etat ? '✓' : '○'}</span>`;
          }

          div.innerHTML = `
            <span class="tache-icone">${t.icone}</span>
            <span class="tache-label">${t.label}</span>
            ${bouton}
          `;

          if (!estTV) {
            div.addEventListener('click', () => toggleTache(div, t.id));
          }
          liste.appendChild(div);
        });

        verifierTout();
        if (routineData.id === 'soir') majCompteurTV();

      } catch (e) {
        console.error('Erreur chargement routine:', e);
      }
    }

    // --- Toggle tâche ---
    async function toggleTache(el, entityId) {
      el.classList.toggle('validee');
      const btn = el.querySelector('.tache-btn');
      if (btn) btn.textContent = el.classList.contains('validee') ? '✓' : '○';
      verifierTout();
      try {
        await fetch(`/api/taches/${encodeURIComponent(entityId)}/toggle`, { method: 'POST' });
      } catch (e) {
        el.classList.toggle('validee');
        if (btn) btn.textContent = el.classList.contains('validee') ? '✓' : '○';
      }
    }

    // --- Vérifier si tout est coché ---
    function verifierTout() {
      const taches = document.querySelectorAll('.tache');
      const toutes = Array.from(taches).every(t => t.classList.contains('validee'));
      const bravo  = document.getElementById('bravo');
      bravo.classList.toggle('visible', toutes);
      if (routineData && toutes) {
        const box = document.getElementById('countdown-box');
        box.className = 'countdown-box done';
        document.getElementById('countdown-label').textContent = 'Prêt !';
      }
    }

    // --- Bandeau Shield ---
    async function majShield() {
      try {
        const res  = await fetch('/api/shield');
        const data = await res.json();
        const bandeau = document.getElementById('bandeau-tv');
        const dureeEl = document.getElementById('shield-duree');

        // Affichage durée
        const duree = data.shieldToday;
        dureeEl.textContent = duree !== undefined ? duree : '--';

        // Couleur selon état
        if (data.tvState === 'on' || data.tvState === 'playing' || data.tvState === 'paused') {
          bandeau.classList.add('allume');
        } else {
          bandeau.classList.remove('allume');
        }

        // Mise à jour tâche TV si routine soir
        if (routineData && routineData.id === 'soir') {
          const tvTache = document.querySelector('.tache[data-id="media_player.shield_2"]');
          if (tvTache) {
            const tvEteinte = data.tvState === 'off' || data.tvState === 'unavailable' || data.tvState === 'idle' || data.tvState === 'standby';
            tvTache.classList.toggle('validee', tvEteinte);
            const btn = tvTache.querySelector('.tache-btn');
            const ctd = tvTache.querySelector('.tv-countdown');
            if (tvEteinte) {
              if (ctd) ctd.outerHTML = `<span class="tache-btn">✓</span>`;
              else if (btn) btn.textContent = '✓';
            } else {
              if (btn && !ctd) btn.outerHTML = `<span class="tv-countdown">...</span>`;
              majCompteurTV();
            }
            verifierTout();
          }
        }
      } catch (e) {
        console.error('Erreur shield:', e);
      }
    }

    // --- Init ---
    majHeure();
    chargerRoutine();
    majShield();

    setInterval(majHeure, 10000);
    setInterval(() => {
      if (routineData) majCompteur(routineData.departH, routineData.departM);
    }, 30000);
    setInterval(majCompteurTV, 30000);
    setInterval(chargerRoutine, 15000);
    setInterval(majShield, 10000);
  </script>
</body>
</html>
