# Capteurs existants pour Noisette (My Bunny)
# On utilise les entités Tuya déjà intégrées

sensor:
  # Température de la cage (déjà existante)
  - platform: template
    sensors:
      bunny_temperature:
        friendly_name: "Température de la cage"
        unit_of_measurement: "°C"
        value_template: "{{ states('sensor.thermo_bureau_kos_temperature') }}"
        icon_template: >-
          {% if states('sensor.thermo_bureau_kos_temperature') | float > 25 %}
            mdi:thermometer-alert
          {% elif states('sensor.thermo_bureau_kos_temperature') | float < 18 %}
            mdi:thermometer-low
          {% else %}
            mdi:thermometer
          {% endif %}
        device_class: temperature

  # Humidité de la cage (déjà existante)
  - platform: template
    sensors:
      bunny_humidity:
        friendly_name: "Humidité de la cage"
        unit_of_measurement: "%"
        value_template: "{{ states('sensor.thermo_bureau_kos_humidite') }}"
        icon_template: >-
          {% if states('sensor.thermo_bureau_kos_humidite') | float > 70 %}
            mdi:water-alert
          {% elif states('sensor.thermo_bureau_kos_humidite') | float < 40 %}
            mdi:water-off
          {% else %}
            mdi:water-percent
          {% endif %}
        device_class: humidity

  # Batterie du capteur (optionnel)
  - platform: template
    sensors:
      bunny_battery_level:
        friendly_name: "Niveau de batterie"
        unit_of_measurement: "%"
        value_template: "{{ states('sensor.thermo_bureau_kos_etat_batterie') }}"
        icon_template: >-
          {% if states('sensor.thermo_bureau_kos_etat_batterie') | float < 20 %}
            mdi:battery-alert
          {% elif states('sensor.thermo_bureau_kos_etat_batterie') | float < 50 %}
            mdi:battery-50
          {% else %}
            mdi:battery-high
          {% endif %}
        device_class: battery
