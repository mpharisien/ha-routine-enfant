# Tableau de bord Lovelace pour My Bunny
# À placer dans le dossier dashboards/ de ta configuration

views:
  - title: "My Bunny"
    icon: mdi:rabbit
    path: my-bunny
    badges: []
    cards:
      # ===== FICHE D'IDENTITÉ =====
      - type: entities
        title: "🐰 Fiche d'identité"
        show_header_toggle: false
        style: |
          ha-card {
            background: #1E1E1E;
            border-radius: 10px;
            box-shadow: 0px 0px 10px 2px rgba(0,0,0,0.5);
          }
        entities:
          - entity: input_text.bunny_name
          - entity: input_text.bunny_species
          - entity: input_datetime.bunny_birthdate
            secondary_info: last-changed
            format: date
          - entity: input_boolean.bunny_sterilized
          - entity: input_text.bunny_chip
          - entity: input_text.bunny_notes
            secondary_info: none

      # ===== TEMPÉRATURE & HUMIDITÉ =====
      - type: horizontal-stack
        cards:
          - type: gauge
            title: "Température"
            entity: sensor.bunny_temperature
            unit: "°C"
            needle: true
            min: 10
            max: 30
            severity:
              green: 18
              yellow: 22
              red: 25
            icon: mdi:thermometer
            style: |
              ha-card {
                background: #1E1E1E;
                border-radius: 10px;
                box-shadow: 0px 0px 10px 2px rgba(0,0,0,0.5);
              }

          - type: gauge
            title: "Humidité"
            entity: sensor.bunny_humidity
            unit: "%"
            needle: true
            min: 0
            max: 100
            severity:
              green: 40
              yellow: 60
              red: 80
            icon: mdi:water-percent
            style: |
              ha-card {
                background: #1E1E1E;
                border-radius: 10px;
                box-shadow: 0px 0px 10px 2px rgba(0,0,0,0.5);
              }

      # ===== BATTERIE (OPTIONNEL) =====
      - type: entities
        title: "🔋 Batterie du capteur"
        show_header_toggle: false
        style: |
          ha-card {
            background: #1E1E1E;
            border-radius: 10px;
            box-shadow: 0px 0px 10px 2px rgba(0,0,0,0.5);
          }
        entities:
          - entity: sensor.bunny_battery_level
            name: "Niveau de batterie"
            type: gauge
            unit: "%"

      # ===== POIDS =====
      - type: entities
        title: "📏 Poids"
        show_header_toggle: false
        style: |
          ha-card {
            background: #1E1E1E;
            border-radius: 10px;
            box-shadow: 0px 0px 10px 2px rgba(0,0,0,0.5);
          }
        entities:
          - entity: input_number.bunny_weight
            name: "Poids actuel"
          - type: history-graph
            entities:
              - entity: input_number.bunny_weight
            hours_to_show: 168  # 1 semaine
            refresh_interval: 3600
            title: "Historique des relevés"

      # ===== ÉVÉNEMENTS MÉDICAUX =====
      - type: entities
        title: "🏥 Événements médicaux"
        show_header_toggle: false
        style: |
          ha-card {
            background: #1E1E1E;
            border-radius: 10px;
            box-shadow: 0px 0px 10px 2px rgba(0,0,0,0.5);
          }
        entities:
          - type: markdown
            content: |
              **Vaccin myxomatose**
              12 jan. 2026 - Dr Lefèvre
              Rappel annuel effectué. Aucune réaction.

              **Consultation vétérinaire**
              3 mar. 2026 - Clinique du Parc
              Contrôle dentaire, dents en bon état.

              **Stronghold antiparasitaire**
              1 avr. 2026
              Application mensuelle. Prochain : 1 mai.

          - type: divider
          - entity: input_datetime.bunny_last_vaccine
            name: "Dernier vaccin"
            format: date
          - entity: sensor.bunny_next_vaccine_calculated
            name: "Prochain rappel"
            icon: mdi:calendar-clock
          - entity: input_datetime.bunny_last_vet_visit
            name: "Dernière visite vétérinaire"
            format: date
          - entity: input_datetime.bunny_next_vet_visit
            name: "Prochaine visite"
            format: date
          - entity: input_datetime.bunny_last_parasite_treatment
            name: "Dernier antiparasitaire"
            format: date
          - entity: sensor.bunny_next_parasite_treatment_calculated
            name: "Prochain traitement"
            icon: mdi:calendar-clock
          - type: divider
          - type: button
            name: "Ajouter un événement"
            icon: mdi:plus
            tap_action:
              action: url
              url_path: "/config/helpers"
            hold_action:
              action: none

      # ===== COUPE DES GRIFFES =====
      - type: entities
        title: "✂️ Coupe des griffes"
        show_header_toggle: false
        style: |
          ha-card {
            background: #1E1E1E;
            border-radius: 10px;
            box-shadow: 0px 0px 10px 2px rgba(0,0,0,0.5);
          }
        entities:
          - entity: input_datetime.bunny_last_claw_cut
            name: "Dernière coupe"
            format: date
          - entity: sensor.bunny_next_claw_cut_calculated
            name: "Prochaine recommandée"
            icon: mdi:calendar-clock
          - type: markdown
            content: |
              **Fréquence habituelle** : toutes les 4 semaines
              **Historique** : 14 avr. - 17 mar. - 18 fév. - 22 jan.
          - type: divider
          - type: button
            name: "Enregistrer une coupe"
            icon: mdi:content-save
            tap_action:
              action: url
              url_path: "/config/helpers"
            hold_action:
              action: none
