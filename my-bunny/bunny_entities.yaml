# Entités personnalisées pour Noisette (My Bunny)
# Tout commence par "bunny_" pour une identification facile

input_text:
  bunny_name:
    name: "Nom du lapin"
    initial: "Noisette"
    icon: mdi:rabbit

  bunny_species:
    name: "Espèce"
    initial: "Lapin bélier"
    icon: mdi:paw

  bunny_chip:
    name: "Numéro de puce"
    initial: "#250268501234567"
    icon: mdi:barcode

  bunny_notes:
    name: "Notes"
    initial: ""
    icon: mdi:note-text

input_datetime:
  # Dates importantes
  bunny_birthdate:
    name: "Date de naissance"
    has_date: true
    has_time: false
    initial: "2025-03-12"
    icon: mdi:cake-variant

  bunny_last_claw_cut:
    name: "Dernière coupe des griffes"
    has_date: true
    has_time: false
    icon: mdi:scissors-cutting

  bunny_next_claw_cut:
    name: "Prochaine coupe recommandée"
    has_date: true
    has_time: false
    icon: mdi:calendar-clock

  # Événements médicaux
  bunny_last_vaccine:
    name: "Dernier vaccin"
    has_date: true
    has_time: false
    icon: mdi:syringe

  bunny_next_vaccine:
    name: "Prochain vaccin"
    has_date: true
    has_time: false
    icon: mdi:calendar-clock

  bunny_last_vet_visit:
    name: "Dernière visite vétérinaire"
    has_date: true
    has_time: false
    icon: mdi:dog-side

  bunny_next_vet_visit:
    name: "Prochaine visite"
    has_date: true
    has_time: false
    icon: mdi:calendar-clock

  bunny_last_parasite_treatment:
    name: "Dernier traitement antiparasitaire"
    has_date: true
    has_time: false
    icon: mdi:spray

input_boolean:
  bunny_sterilized:
    name: "Stérilisé(e)"
    initial: false
    icon: mdi:gender-female

input_number:
  # Poids actuel
  bunny_weight:
    name: "Poids actuel"
    min: 0
    max: 5000
    step: 1
    unit_of_measurement: "g"
    mode: box
    icon: mdi:scale-bathroom
